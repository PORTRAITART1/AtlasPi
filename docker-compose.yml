version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atlaspi-backend
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      # APP_MODE can also be overridden at runtime
      # - APP_MODE=demo
      # - APP_MODE=pirc2-sandbox
      # - APP_MODE=pirc2-production
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    # Use custom healthcheck that respects environment configuration
    # Healthcheck will report backend readiness along with configuration info
    networks:
      - atlaspi-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health", "||" , "exit", "1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    image: node:18-alpine
    container_name: atlaspi-frontend
    working_dir: /app
    # Start http-server with dynamic config injection
    command: >
      sh -c "
      echo 'window.ATLASPI_CONFIG = { API_BASE_URL: \"http://localhost:3000\" };' > config-runtime.js
      npx http-server -p 8080 -c-1
      "
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app
    networks:
      - atlaspi-network
    depends_on:
      backend:
        condition: service_healthy

networks:
  atlaspi-network:
    driver: bridge
