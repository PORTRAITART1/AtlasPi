  #     discovery.type: single-node
  #   ports:
  #     - "9200:9200"
  #   volumes:
  #     - elasticsearch-data:/usr/share/elasticsearch/data
  #   networks:
  #     - agent-network

  # kibana:
  #   image: docker.elastic.co/kibana/kibana:8.0.0
  #   ports:
  #     - "5601:5601"
  #   environment:
  #     ELASTICSEARCH_HOSTS: http://elasticsearch:9200
  #   depends_on:
  #     - elasticsearch
  #   networks:
  #     - agent-network

# ============================================================
# NETWORKS
# ============================================================
networks:
  atlaspi-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

  agent-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
    # Agent components communicate here (isolated from frontend)

  pi-mainnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16
    # Pi Network consensus traffic (can be encrypted with WireGuard)

# ============================================================
# VOLUMES
# ============================================================
volumes:
  prometheus-data:
  pi-node-data:
  pi-node-ledger:
  # elasticsearch-data:  (uncomment for ELK)

