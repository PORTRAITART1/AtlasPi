# Prometheus Configuration for AIAR Observability
# Scrapes metrics from agent components + application services

global:
  scrape_interval: 30s
  evaluation_interval: 15s
  external_labels:
    monitor: 'aiar-prod'
    environment: 'production'

# Alertmanager config (optional)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            # - 'alertmanager:9093'

# Scrape configurations

scrape_configs:
  # ========== AIAR Agent Metrics ==========
  - job_name: 'aiar-controller'
    static_configs:
      - targets: ['aiar-controller:9090']
        labels:
          instance: 'aiar-prod-001'
    scrape_interval: 30s
    metrics_path: '/metrics'

  # ========== Backend Service Metrics ==========
  - job_name: 'backend'
    static_configs:
      - targets: ['backend:9090']
        labels:
          service: 'atlaspi-backend'
    scrape_interval: 30s
    metrics_path: '/metrics'

  # ========== Docker Daemon Metrics (via cAdvisor) ==========
  # Note: Requires cAdvisor sidecar or external monitoring
  # Disabled for now — enable when cAdvisor is deployed
  # - job_name: 'docker'
  #   static_configs:
  #     - targets: ['cadvisor:8080']
  #   scrape_interval: 30s

  # ========== Pi Node Metrics ==========
  # Disabled for now — enable when pi-node is deployed
  # - job_name: 'pi-node'
  #   static_configs:
  #     - targets: ['pi-node:31401']
  #       labels:
  #         node_role: 'autonomous_builder'
  #   scrape_interval: 60s
  #   metrics_path: '/api/metrics'

  # ========== Prometheus self-monitoring ==========
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# Alert rules (can be extended)
rule_files:
  - '/etc/prometheus/rules/*.yml'

