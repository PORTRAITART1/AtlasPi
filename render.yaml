services:
  # Frontend Service
  - type: web
    name: atlaspi-frontend
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    plan: free
    region: oregon
    healthCheckPath: /
    port: 3000
    envVars:
      - key: VITE_PI_API
        value: "https://api.minepi.com"
      - key: VITE_APP_ID
        value: ${VITE_APP_ID}
      - key: VITE_API_BASE
        value: "https://atlaspi-backend.onrender.com"
      - key: NODE_ENV
        value: "production"

  # Backend Service
  - type: web
    name: atlaspi-backend
    runtime: node
    rootDir: backend
    buildCommand: "npm ci"
    startCommand: "npm start"
    plan: free
    region: oregon
    healthCheckPath: /api/health
    port: 3001
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "3001"
      - key: PI_SERVER_API_KEY
        value: ${PI_SERVER_API_KEY}
      - key: PI_NETWORK
        value: "testnet"
      - key: VITE_PI_API
        value: "https://api-testnet.minepi.com"
      - key: LOG_LEVEL
        value: "info"
      - key: FRONTEND_URL
        value: "https://atlaspi-frontend.onrender.com"
