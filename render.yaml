services:
  # Frontend Service
  - type: web
    name: atlaspi-fronted
    runtime: docker
    dockerfilePath: ./Dockerfile.frontend
    buildCommand: "npm ci && npm run build 2>/dev/null || true"
    startCommand: "nginx -g 'daemon off;'"
    plan: free
    region: oregon
    healthCheckPath: /health
    port: 3000
    envVars:
      - key: VITE_PI_API
        value: "https://api.minepi.com"
      - key: VITE_APP_ID
        fromService:
          type: env
          name: VITE_APP_ID
      - key: VITE_API_BASE
        value: "https://atlaspi-backend.onrender.com"
      - key: NODE_ENV
        value: "production"

  # Backend Service
  - type: web
    name: atlaspi-backend
    runtime: node
    buildCommand: "npm ci"
    startCommand: "npm start"
    plan: free
    region: oregon
    healthCheckPath: /api/health
    port: 3001
    envVars:
      - key: NODE_ENV
        value: "production"
      - key: PORT
        value: "3001"
      - key: PI_SERVER_API_KEY
        fromService:
          type: env
          name: PI_SERVER_API_KEY
      - key: PI_NETWORK
        value: "testnet"
      - key: VITE_PI_API
        value: "https://api-testnet.minepi.com"
      - key: LOG_LEVEL
        value: "info"
