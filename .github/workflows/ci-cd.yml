# GitHub Actions CI/CD Pipeline for AtlasPi
# Multi-arch builds with Docker Build Cloud, automatic deployment to K8s

name: 'AtlasPi Production CI/CD'

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - 'aiar/**'
      - 'docker-bake.hcl'
      - '.github/workflows/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  DOCKER_ORG: abdelouhhab
  VERSION: 1.0.0

jobs:
  # Job 1: Build & Push Multi-Arch Images
  build-and-push:
    name: Build & Push Multi-Arch Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./backend/Dockerfile.optimized
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.DOCKER_ORG }}/atlaspi-backend:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.DOCKER_ORG }}/atlaspi-backend:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.DOCKER_ORG }}/atlaspi-backend:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.DOCKER_ORG }}/atlaspi-backend:buildcache,mode=max

      - name: Build and push AIAR
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./aiar/Dockerfile
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.DOCKER_ORG }}/atlaspi-aiar:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.DOCKER_ORG }}/atlaspi-aiar:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.DOCKER_ORG }}/atlaspi-aiar:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.DOCKER_ORG }}/atlaspi-aiar:buildcache,mode=max

  # Job 2: Security Scanning
  security-scan:
    name: Security Scanning
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.DOCKER_ORG }}/atlaspi-backend:${{ env.VERSION }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # Job 3: Unit & Integration Tests
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          docker compose -f docker-compose.prod.yml up -d
          sleep 30

      - name: Health check Backend
        run: |
          curl -f http://localhost:3000/api/health || exit 1

      - name: Health check Prometheus
        run: |
          curl -f http://localhost:9090/api/v1/status/config || exit 1

      - name: Stop services
        run: docker compose -f docker-compose.prod.yml down

  # Job 4: Deploy to Kubernetes
  deploy-k8s:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build-and-push, security-scan, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s-manifest.yaml

      - name: Wait for deployments to be ready
        run: |
          kubectl rollout status deployment/backend -n atlaspi --timeout=5m
          kubectl rollout status deployment/aiar-controller -n atlaspi --timeout=5m
          kubectl rollout status deployment/prometheus -n atlaspi --timeout=5m

      - name: Verify pod status
        run: |
          kubectl get pods -n atlaspi
          kubectl get services -n atlaspi

      - name: Check pod logs
        if: failure()
        run: |
          kubectl logs -n atlaspi -l app=backend --tail=50
          kubectl logs -n atlaspi -l app=aiar-controller --tail=50

  # Job 5: Smoke Tests Post-Deployment
  smoke-tests:
    name: Post-Deployment Smoke Tests
    runs-on: ubuntu-latest
    needs: deploy-k8s
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Port forward Backend
        run: |
          kubectl port-forward -n atlaspi svc/backend 3000:3000 &
          sleep 5

      - name: Test Backend health
        run: |
          curl -f http://localhost:3000/api/health || exit 1

      - name: Port forward Prometheus
        run: |
          kubectl port-forward -n atlaspi svc/prometheus 9090:9090 &
          sleep 5

      - name: Test Prometheus metrics
        run: |
          curl -f http://localhost:9090/api/v1/status/config || exit 1

  # Job 6: Notification
  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [build-and-push, security-scan, test, deploy-k8s, smoke-tests]
    if: always()
    steps:
      - name: Deployment Success
        if: success()
        run: |
          echo "✅ AtlasPi deployment successful!"
          echo "Environment: Production (Kubernetes)"
          echo "Version: ${{ env.VERSION }}"

      - name: Deployment Failure
        if: failure()
        run: |
          echo "❌ AtlasPi deployment failed!"
          exit 1
