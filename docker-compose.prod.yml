# Simplified Production Compose: Backend + Prometheus + AIAR Controller
# For Docker Build Cloud High Performance (sans Pi Node)
# Deploy with: docker compose -f docker-compose.prod.yml up --pull always

services:
  # ============================================================
  # BACKEND: Main AtlasPi API Service
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: ./Dockerfile.optimized
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
        VERSION: ${VERSION:-1.0.0}
    image: atlaspi-backend:${VERSION:-latest}
    container_name: atlaspi-backend
    ports:
      - "3000:3000"
    environment:
      APP_MODE: ${APP_MODE:-demo}
      NODE_ENV: production
      LOG_LEVEL: info
      AGENT_ENABLED: "true"
      AGENT_METRICS_PORT: "9090"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
    networks:
      - atlaspi-network
      - agent-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => { if(r.statusCode !== 200) throw new Error(r.statusCode); process.exit(0); }); setTimeout(() => process.exit(1), 2000)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ============================================================
  # PROMETHEUS: Metrics collection for AIAR observability
  # ============================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: atlaspi-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - agent-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============================================================
  # AIAR CONTROLLER: Agent IA Autonome Responsable
  # ============================================================
  aiar-controller:
    build:
      context: ./aiar
      dockerfile: ./Dockerfile
    image: atlaspi-aiar:latest
    container_name: atlaspi-aiar-controller
    environment:
      AGENT_ID: "aiar-prod-001"
      AGENT_TYPE: "ABA|AMB|ADAV|ASI"
      AGENT_MODE: "autonomous"
      APPROVAL_THRESHOLD_RISK_LEVEL: "MEDIUM"
      DOCKER_BUILD_CLOUD_ENABLED: "true"
      DOCKER_BUILD_CLOUD_TOKEN: ${DOCKER_BUILD_CLOUD_TOKEN:-}
      DOCKER_BUILD_CLOUD_ORG: ${DOCKER_BUILD_CLOUD_ORG:-}
      DOCKER_REGISTRY: ${DOCKER_REGISTRY:-docker.io}
      PROMETHEUS_URL: "http://prometheus:9090"
      LOG_LEVEL: info
      LOG_FORMAT: json
      BUILD_TIMEOUT_SECONDS: 300
      DEPLOY_TIMEOUT_SECONDS: 600
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./aiar/config.yaml:/etc/aiar/config.yaml:ro
      - ./aiar/logs:/var/log/aiar
      - ./aiar/decisions:/var/lib/aiar/decisions
    networks:
      - atlaspi-network
      - agent-network
    depends_on:
      backend:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import time; print('AIAR healthy')"]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped

# ============================================================
# NETWORKS
# ============================================================
networks:
  atlaspi-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

  agent-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

# ============================================================
# VOLUMES
# ============================================================
volumes:
  prometheus-data:
